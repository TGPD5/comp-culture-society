<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Synthetic Dialogue</title>
  <link rel="stylesheet" href="wk5.css">
</head>
<body>

  <!-- INTRO SCREEN -->
  <div id="screen-intro" class="screen active">
    <div class="intro-wrap">

      <header class="intro-header">
        <div class="intro-badge"><span class="badge-dot"></span>AI vs AI · Live</div>
        <h1 class="intro-title">Synthetic <span>Dialogue</span></h1>
        <p class="intro-sub">Choose a scenario. Enter a topic. Watch two AI minds debate in real time.</p>
      </header>

      <div class="mode-grid">

        <button class="mode-card" data-mode="friendly">
          <div class="mode-stripe"></div>
          <div class="mode-card-body">
            <div class="mode-name">Friendly Debate</div>
            <div class="mode-tagline">Two minds, one question</div>
            <div class="mode-vs-row">
              <span class="mv-a">Defender</span>
              <span class="mv-sep">vs</span>
              <span class="mv-b">Challenger</span>
            </div>
          </div>
        </button>

        <button class="mode-card" data-mode="presidential">
          <div class="mode-stripe"></div>
          <div class="mode-card-body">
            <div class="mode-name">Presidential Debate</div>
            <div class="mode-tagline">The race for the highest office</div>
            <div class="mode-vs-row">
              <span class="mv-a">Incumbent</span>
              <span class="mv-sep">vs</span>
              <span class="mv-b">Challenger</span>
            </div>
          </div>
        </button>

        <button class="mode-card" data-mode="academic">
          <div class="mode-stripe"></div>
          <div class="mode-card-body">
            <div class="mode-name">Academic Debate</div>
            <div class="mode-tagline">The arena of ideas</div>
            <div class="mode-vs-row">
              <span class="mv-a">Prof. Chen</span>
              <span class="mv-sep">vs</span>
              <span class="mv-b">Prof. Hayes</span>
            </div>
          </div>
        </button>

        <button class="mode-card" data-mode="lab">
          <div class="mode-stripe"></div>
          <div class="mode-card-body">
            <div class="mode-name">Lab Argument</div>
            <div class="mode-tagline">Science in progress</div>
            <div class="mode-vs-row">
              <span class="mv-a">Dr. Reyes</span>
              <span class="mv-sep">vs</span>
              <span class="mv-b">Dr. Park</span>
            </div>
          </div>
        </button>

      </div>

      <div id="topic-section" class="hidden">
        <p id="mode-desc" class="mode-desc-text"></p>
        <div class="intro-form">
          <input id="topic-input" type="text" maxlength="200" autocomplete="off" spellcheck="false">
          <button id="btn-start">Start dialogue →</button>
        </div>
        <div class="intro-examples">
          <span class="example-label">Try:</span>
          <div id="example-btns"></div>
        </div>
      </div>

    </div>
  </div>

  <!-- DIALOGUE SCREEN -->
  <div id="screen-dialogue" class="screen">

    <div id="dialogue-header">
      <div class="agent-label" id="label-a">
        <span class="agent-dot dot-a"></span>
        <span class="agent-name">Voice A</span>
        <span class="agent-stance">Defender</span>
      </div>
      <div id="topic-display"></div>
      <div class="agent-label" id="label-b">
        <span class="agent-stance">Challenger</span>
        <span class="agent-name">Voice B</span>
        <span class="agent-dot dot-b"></span>
      </div>
    </div>

    <div id="transcript"></div>

    <div id="dialogue-footer">
      <div id="status-bar">
        <span id="status-text">Initialising…</span>
        <span id="turn-counter"></span>
      </div>
      <button id="btn-stop" class="hidden">Stop</button>
      <button id="btn-restart" class="hidden">New topic</button>
    </div>

  </div>

  <script src="wk5.js"></script>
</body>
</html>
