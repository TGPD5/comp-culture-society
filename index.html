<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WikiGraph — Six Degrees of Wikipedia</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="ui">
    <div id="topbar">
      <h1>WikiGraph</h1>

      <div class="inputs">
        <div class="input-group">
          <label>From</label>
          <input id="source" type="text" placeholder="e.g. ARPANET" value="ARPANET" autocomplete="off" />
          <div class="suggestions" id="source-suggestions"></div>
        </div>
        <div class="arrow">→</div>
        <div class="input-group">
          <label>To</label>
          <input id="target" type="text" placeholder="e.g. Facebook" value="Facebook" autocomplete="off" />
          <div class="suggestions" id="target-suggestions"></div>
        </div>
        <button id="start-btn">Explore</button>
      </div>

      <div id="stats" class="hidden">
        <div class="stat"><span id="stat-nodes">0</span><small>nodes</small></div>
        <div class="stat"><span id="stat-edges">0</span><small>links</small></div>
        <div class="stat"><span id="stat-depth">0</span><small>depth</small></div>
        <div class="stat"><span id="stat-path">—</span><small>path</small></div>
      </div>

      <div id="status"></div>
    </div>

    <div id="side-panel">
      <div id="path-display" class="hidden">
        <h3>Path found</h3>
        <div id="path-nodes"></div>
      </div>

      <div id="legend">
        <div class="legend-item"><span class="dot source-dot"></span> Source</div>
        <div class="legend-item"><span class="dot target-dot"></span> Target</div>
        <div class="legend-item"><span class="dot hub-dot"></span> Hub (high degree)</div>
        <div class="legend-item"><span class="dot path-dot"></span> Path</div>
      </div>
    </div>
  </div>

  <div id="graph-container"></div>

  <div id="tooltip"></div>

  <script src="https://unpkg.com/3d-force-graph@1.73.0/dist/3d-force-graph.min.js"></script>
  <script src="graph.js"></script>
</body>
</html>
