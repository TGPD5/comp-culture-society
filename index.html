<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Augmented — A Game of Compounding Discovery</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<div id="app">

  <!-- Header -->
  <header id="header">
    <h1>Augmented</h1>
    <span class="era-badge" id="era-name">Stone Age</span>
    <div class="currency-display">
      <div class="currency-item">
        <span class="icon">⚡</span>
        <span class="val" id="energy-val">50</span>
        <span class="label">energy</span>
      </div>
      <div class="currency-item">
        <span class="icon">💰</span>
        <span class="val" id="money-val">0</span>
        <span class="label">money</span>
      </div>
    </div>
    <div id="passive-display" style="font-size:0.65rem;color:#444466;margin-left:8px"></div>
  </header>

  <!-- Left: Inventory -->
  <aside id="panel-inventory">
    <h2>Inventory</h2>
    <div id="inv-list"></div>
  </aside>

  <!-- Center -->
  <main id="panel-center">
    <div id="workshop">
      <h2>Workshop — Combine</h2>
      <div id="combine-area">
        <div class="combine-slot" id="slot-0" onclick="clearSlot(0)">Click item</div>
        <div class="combine-plus">+</div>
        <div class="combine-slot" id="slot-1" onclick="clearSlot(1)">Click item</div>
        <div class="combine-arrow">→</div>
        <button id="btn-combine" onclick="doCombine()" disabled>Combine</button>
      </div>
      <div id="combine-hint" style="font-size:0.72rem;margin-bottom:14px;min-height:16px"></div>

      <div id="research-area">
        <h2>Research</h2>
        <div class="research-cards" id="research-cards"></div>
      </div>
    </div>

    <!-- Log -->
    <div id="log-area"></div>
  </main>

  <!-- Right: tech tree + deploy -->
  <aside id="panel-right">
    <div>
      <h2>Discovered</h2>
      <div id="tech-list"></div>
    </div>
    <div>
      <h2>Deploy</h2>
      <div id="deploy-list"></div>
    </div>
  </aside>

</div>

<div id="tooltip"></div>
<script src="game.js"></script>
</body>
</html>
